<div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white border-end border-secondary" style="min-height: 100vh;">
    <div class="mb-4 text-center">
        <h5 class="fw-bold text-white">Painel Gestão</h5>
        <hr class="border-secondary opacity-25">
    </div>
    
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item mb-2">
            <a href="{% url 'home_coordenador' %}" 
               class="nav-link {% if request.resolver_match.url_name == 'home_coordenador' %}active{% else %}text-white link-light opacity-75{% endif %}">
                <i class="bi bi-list-check me-2"></i> Lista de Formulários
            </a>
        </li>
        <li class="nav-item mb-2">
            <a href="{% url 'dashboard_coordenador' %}" 
               class="nav-link {% if request.resolver_match.url_name == 'dashboard_coordenador' %}active{% else %}text-white link-light opacity-75{% endif %}">
                <i class="bi bi-graph-up me-2"></i> Dashboard Gráficos
            </a>
        </li>
    </ul>

    <hr class="border-secondary opacity-25">
    
    <div class="pb-3 px-2">
        <div class="small fw-bold text-secondary mb-2 text-uppercase" style="font-size: 0.75rem;">Meus Setores</div>
        {% for setor in request.user.coordenador.setores.all %}
            <div class="badge bg-secondary bg-opacity-25 border border-secondary mb-1 d-block text-start p-2 fw-normal">
                <i class="bi bi-geo-alt small me-1"></i> {{ setor.nome }}
            </div>
        {% empty %}
            <small class="text-danger">Nenhum setor vinculado</small>
        {% endfor %}
    </div>

    <hr class="border-secondary opacity-25">

    <div class="dropdown px-2">
        <div class="mb-3">
            <div class="fw-bold text-white">{{ request.user.nome }}</div>
            <div class="small text-secondary" style="font-size: 0.85rem;">{{ request.user.username }}</div>
        </div>
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger w-100 border-0 bg-danger bg-opacity-10 text-danger">
            <i class="bi bi-box-arrow-right me-1"></i> Sair
        </a>
    </div>
</div>

<style>
    .nav-pills .nav-link:not(.active):hover {
        background-color: rgba(255, 255, 255, 0.1);
        opacity: 1;
        color: #fff !important;
    }
</style>
